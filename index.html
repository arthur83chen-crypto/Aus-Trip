<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Australia Trip Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B1F35">
  <link rel="stylesheet" href="style.css">
  <!-- Sortable.js 拖曳函式庫 -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

  <!-- PWA 安裝提示欄 -->
  <div id="pwaBanner">
    <span>💡 將 App 安裝至桌面，體驗更棒的離線地圖與行程功能！</span>
    <button onclick="installPWA()">安裝</button>
  </div>

  <!-- 🏠 頁面：首頁與行程流 -->
  <div id="page-home" class="page active">
    <header class="hero">
      <img src="images/banner/sydney-opera-house.jpg" id="heroImage">
      <div class="heroOverlay">
        <div class="tripTitle">Australia Road Trip</div>
        <div class="tripSub">Sydney → Blue Mountains → Kiama → Brisbane</div>
      </div>
    </header>

    <section class="dashboard">
      <div class="card"><div class="cardTitle">📍 目前城市</div><div class="cardValue" id="cityName">Sydney</div></div>
      <div class="card"><div class="cardTitle">📅 Day</div><div class="cardValue" id="dayNumber">1</div></div>
    </section>

    <section class="section">
      <div class="sectionTitle">🗺️ 行程安排</div>
      <input id="searchBox" class="search-box" placeholder="🔍 搜尋行程景點、備註...">
      
      <div class="input-bar">
        <input id="quickInput" type="text" placeholder="⚡ 快速新增景點至第一天...">
        <button class="primary-btn" onclick="quickAddPlace()">+</button>
      </div>

      <div id="tripContainer"></div>
    </section>
  </div>

  <!-- 🧳 頁面：行李檢查清單 -->
  <div id="page-bag" class="page">
    <section class="section">
      <div class="sectionTitle">🧳 行李清單檢查</div>
      
      <div class="input-bar">
        <select id="bagCategorySelect" style="padding:10px; background:#122a46; border:1px solid var(--line); color:white; border-radius:10px;">
          <option value="證件">證件</option>
          <option value="電子用品">電子用品</option>
          <option value="衣物">衣物</option>
          <option value="盥洗用品">盥洗用品</option>
          <option value="常備藥">常備藥</option>
          <option value="其他">其他</option>
        </select>
        <input id="bagInput" type="text" placeholder="新增行李項目...">
        <button class="primary-btn" onclick="addBagItem()">+</button>
      </div>

      <div id="bagContainer" class="bagGrid"></div>
    </section>
  </div>

  <!-- 💰 頁面：記帳 -->
  <div id="page-money" class="page">
    <section class="section">
      <div class="sectionTitle">💰 記帳功能</div>
      <p style="color:var(--sub)">模組串接中，敬請期待...</p>
    </section>
  </div>

  <!-- 👥 頁面：更多 -->
  <div id="page-more" class="page">
    <section class="section">
      <div class="sectionTitle">👥 更多設定</div>
      <p style="color:var(--sub)">PWA 版本：v1.0.0 (2026 最新版)</p>
    </section>
  </div>

  <!-- 全域浮動按鈕 (僅在首頁顯示) -->
  <div class="fab" id="editButton">✏️</div>

  <!-- 底部導覽 Tab -->
  <nav class="bottomBar">
    <div class="tab active"><i>🏠</i>首頁</div>
    <div class="tab"><i>🗺️</i>行程</div>
    <div class="tab"><i>🧳</i>行李</div>
    <div class="tab"><i>💰</i>記帳</div>
    <div class="tab"><i>👥</i>更多</div>
  </nav>

  <!-- 行程編輯彈窗 Modal -->
  <div id="editModal" class="modal">
    <div class="modalCard">
      <div class="modalHeader">
        <h2 id="modalTitle">✏️ 編輯行程</h2>
        <button onclick="closeEditor()">✕</button>
      </div>
      <div class="modalBody">
        <label>天數 (Day)</label>
        <input id="editDayNum" type="number" min="1">
        <label>日期</label>
        <input id="editDate" type="date">
        <label>地點城市</label>
        <input id="editCity" type="text">
        <label>景點名稱</label>
        <input id="editPlace" type="text">
        <label>時間</label>
        <input id="editTime" type="time">
        <label>說明</label>
        <textarea id="editNote" rows="3"></textarea>
        <label>該天 Banner 網址</label>
        <input id="editBanner" type="text">
        <label>景點圖片網址</label>
        <input id="editPhoto" type="text">
        <button class="saveBtn" onclick="saveTrip()">💾 儲存</button>
      </div>
    </div>
  </div>

  <div id="toast">✔</div>

  <script src="app.js"></script>
</body>
</html>
